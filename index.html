<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Media Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    
    <div class="app-header">
    <div class="logo"></div>
    <div class="app-header">
       
    
    <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 64 64">
            <!-- circle background -->
            <circle cx="32" cy="32" r="30" fill="#0095f6"/>

            <!-- connection nodes -->
            <circle cx="20" cy="24" r="4" fill="white"/>
            <circle cx="44" cy="24" r="4" fill="white"/>
            <circle cx="32" cy="44" r="4" fill="white"/>

            <!-- connecting lines -->
            <line x1="20" y1="24" x2="44" y2="24" stroke="white" stroke-width="2"/>
            <line x1="20" y1="24" x2="32" y2="44" stroke="white" stroke-width="2"/>
            <line x1="44" y1="24" x2="32" y2="44" stroke="white" stroke-width="2"/>
        </svg>
        

        <span class="logo-text">TopSocialConnect</span>
    </div>
<div class="stories-bar" id="storiesBar"></div>
</div>
</div>
    <div class="bottom-nav">

</div>
 <div>
    <button onclick="showHome()">🏠<br><small>Home</small></button>
     <button onclick="showSearch()">🔍<br><small>Search</small></button>
    <button onclick="showProfile()">👤<br><small>Profile</small></button>
</div>
   <div>

   
    <div id="notificationsList"></div>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="backToFeed()">Back to Feed</button>
     

    <input id="usernameInput" placeholder="Username">
    <input id="passwordInput" type="password" placeholder="Password">
  
        
    </div>
     <div class="nav-center"></div>
    <div id="notificationsPanel" style="display:none;"></div>
   <button onclick="showNotifications()">Notifications</button>
<div class="auth-box">
    
</div>

</div>

   
  
<div id="suggestedUsers">
    <h3>People You May Know</h3>
    <div id="suggestedList"></div>
</div>

<div id="profileSection">
    <img id="profilePicDisplay" width="80" height="80" style="border-radius:50%">
    <h3 id="profileName"></h3>
    <p id="postCount"></p>
    <p id="likeCount"></p>

    <!-- FOLLOW BUTTON WILL BE ADDED HERE -->
</div>

<div class="container">

    <!-- USERNAME -->
    <div class="user-box">
        <h3>Enter your username</h3>
        <input id="usernameInput" placeholder="Your username">
        <input id="searchInput" placeholder="Search users or posts..." onkeyup="searchPosts()">
        <button onclick="setUsername()">Save Username</button>
        <input type="file" id="profilePicInput" accept="image/*">

    </div>

    <hr>

    <!-- POST CREATOR -->
    <div class="post-box">
        <textarea id="postInput" placeholder="What's on your mind?"></textarea>

        <input type="file" id="imageInput" accept="image/*">

        <button onclick="createPost()">Post</button>
    </div>
    <div id="chatBox" style="display:none; border:1px solid #ccc; padding:10px;">
    <h3>Chat</h3>

    <div id="chatMessages" style="height:200px; overflow:auto;"></div>

    <input id="chatInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>

    <button onclick="document.getElementById('chatBox').style.display='none'">
        Close
    </button>
</div>

    <!-- PROFILE SECTION -->
<div id="profile" class="profile-box" style="display:none;">
    <img id="profilePicDisplay" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">

    <h2 id="profileName"></h2>

    <div class="profile-stats">
        <p id="postCount"></p>
        <p id="likeCount"></p>
    </div>
</div>


    <!-- FEED -->
    <div id="feed"></div>

</div>

<script src="script.js"></script>
</body>
</html>
